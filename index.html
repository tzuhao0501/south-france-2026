<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏛️ 夢回羅馬小鎮 — 2026 南法盛夏之旅：古羅馬、薰衣草與地中海風情全攻略</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --lavender:#8E7CC3;
    --lavender-soft:#967BB6;
    --lavender-deep:#5F4E96;
    --lavender-mist:#F1EDF9;
    --ochre:#E5A93C;
    --ochre-deep:#B97F1D;
    --ochre-mist:#FBF3E2;
    --ocean:#2A7B9B;
    --ocean-deep:#1D5C75;
    --ocean-mist:#E7F2F6;
    --ink:#2D2A33;
    --stone:#6E6878;
    --bg:#FAFAFA;
    --danger:#C2402A;
    --danger-bg:#FDEDE8;
  }
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif}
  .font-display{font-family:'Marcellus','Noto Serif TC',serif}
  .font-serif-tc{font-family:'Noto Serif TC','Marcellus',serif}
  .section-anchor{scroll-margin-top:84px}
  .card{background:#fff;border:1px solid rgba(94,78,150,.10);border-radius:1.25rem;box-shadow:0 10px 30px -18px rgba(95,78,150,.35)}
  .wiki-link{color:var(--ocean-deep);text-decoration:underline;text-decoration-color:rgba(42,123,155,.35);text-underline-offset:3px;transition:all .18s ease}
  .wiki-link:hover{color:var(--lavender-deep);text-decoration-color:var(--lavender);background:var(--lavender-mist);border-radius:.2rem}
  .avatar{width:2.35rem;height:2.35rem;border-radius:9999px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.72rem;font-weight:700;letter-spacing:.05em;border:2px solid #fff;box-shadow:0 3px 8px rgba(45,42,51,.22);flex:none}
  .avatar-stack .avatar{margin-left:-.55rem}
  .avatar-stack .avatar:first-child{margin-left:0}
  .avatar:hover{transform:translateY(-3px);transition:transform .18s ease;z-index:5}
  .chip{border-radius:9999px;padding:.32rem .85rem;font-size:.8rem;font-weight:600;white-space:nowrap;transition:all .18s ease}
  .badge-tag{display:inline-flex;align-items:center;gap:.3rem;border-radius:9999px;padding:.18rem .7rem;font-size:.72rem;font-weight:700;letter-spacing:.04em}
  .timeline-line{position:absolute;left:1.05rem;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--lavender) 0%,var(--ochre) 55%,var(--ocean) 100%);border-radius:9999px;opacity:.5}
  .milestone{position:absolute;left:0;top:1.6rem;width:2.15rem;height:2.15rem;border-radius:9999px;background:linear-gradient(140deg,var(--lavender),var(--lavender-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Marcellus',serif;font-size:.78rem;box-shadow:0 0 0 5px var(--bg),0 6px 14px rgba(95,78,150,.4)}
  .collapse-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:.75rem;text-align:left;padding:.8rem 1rem;border-radius:.85rem;transition:background .18s ease}
  .collapse-btn:hover{background:var(--lavender-mist)}
  .collapse-btn:focus-visible,a:focus-visible,button:focus-visible,input:focus-visible{outline:3px solid var(--ochre);outline-offset:2px}
  .chev{transition:transform .22s ease}
  .chev.open{transform:rotate(180deg)}
  .fade-in{animation:fadeUp .5s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    .fade-in{animation:none}
    .avatar:hover{transform:none}
    .chev{transition:none}
  }
  .hero-sky{background:
    radial-gradient(1100px 480px at 82% -10%, rgba(229,169,60,.42), transparent 60%),
    radial-gradient(900px 520px at -10% 20%, rgba(42,123,155,.40), transparent 60%),
    linear-gradient(160deg,#4A3C7A 0%,#5F4E96 40%,#7A66B0 68%,#B97F1D 135%)}
  .hero-sky::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(45,42,51,.18) 0%,rgba(45,42,51,.30) 100%);pointer-events:none}
  .stone-texture{background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 2px,transparent 2px 26px),repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 2px,transparent 2px 52px)}
  .check-card input[type=checkbox]{width:1.25rem;height:1.25rem;accent-color:var(--lavender-deep);cursor:pointer}
  .check-card.done{border-color:rgba(142,124,195,.6);background:var(--lavender-mist)}
  .scrollbar-none::-webkit-scrollbar{display:none}
  .scrollbar-none{scrollbar-width:none}
</style>
</head>

  Compass:(p)=>(<Svg {...p}><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12Z"/></Svg>),
};

/* ---------------- 團員資料 ---------------- */
const MEMBERS = ["文安","思賢","皓哲","子豪","國廷","忻叡","韋菖","政倫"];
const AVATAR_COLORS = ["#5F4E96","#2A7B9B","#8E7CC3","#1D5C75","#6B5CA5","#33859F","#7E6BB5","#25708C"];
const memberColor = (name) => AVATAR_COLORS[Math.max(0, MEMBERS.indexOf(name)) % AVATAR_COLORS.length];

const Avatar = ({name}) => (
  <span className="avatar" style={{background:memberColor(name)}} title={name}>{name}</span>
);
const AvatarStack = ({names, label}) => (
  <div className="flex items-center">
    {label && <span className="text-xs font-semibold mr-2" style={{color:"var(--stone)"}}>{label}</span>}
    <div className="flex avatar-stack">{names.map(n => <Avatar key={n} name={n} />)}</div>
  </div>
);

const Wiki = ({href, children}) => (
  <a className="wiki-link" href={href} target="_blank" rel="noopener noreferrer">{children}</a>
);
const MapBtn = ({href, children}) => (
  <a href={href} target="_blank" rel="noopener noreferrer"
     className="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold text-white shadow"
     style={{background:"linear-gradient(135deg,var(--ocean),var(--ocean-deep))"}}>
    <I.MapPin size={14}/>{children}
  </a>
);

/* ---------------- 摺疊區塊 ---------------- */
const Collapse = ({icon, title, tint="var(--lavender-deep)", defaultOpen=false, children}) => {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="rounded-xl border" style={{borderColor:"rgba(94,78,150,.14)", background:"#fff"}}>
      <button type="button" className="collapse-btn" onClick={()=>setOpen(o=>!o)} aria-expanded={open}>
        <span className="flex items-center gap-2 font-bold text-sm" style={{color:tint}}>
          {icon}{title}
        </span>
        <span className={"chev " + (open?"open":"")} style={{color:tint}}><I.Chevron size={18}/></span>
      </button>
      {open && <div className="px-4 pb-4 pt-1 text-sm leading-relaxed fade-in" style={{color:"var(--ink)"}}>{children}</div>}
    </div>
  );
};

const NoteBox = ({title, children, danger=false}) => (
  <div className="rounded-xl p-4 border-l-4"
       style={danger
         ? {background:"var(--danger-bg)", borderColor:"var(--danger)"}
         : {background:"var(--ochre-mist)", borderColor:"var(--ochre)"}}>
    <div className="flex items-center gap-2 font-bold text-sm mb-1" style={{color: danger ? "var(--danger)" : "var(--ochre-deep)"}}>
      {danger ? <I.Alert size={17}/> : <I.Lightbulb size={17}/>}{title}
    </div>
    <div className="text-sm leading-relaxed" style={{color:"var(--ink)"}}>{children}</div>
  </div>
);

/* 每日地標相簿（橫向滑動；Unsplash 失效時自動顯示漸層備援） */
const Gallery = ({items}) => (
  <div className="flex gap-3 overflow-x-auto px-5 pt-5 pb-1 scrollbar-none" style={{scrollSnapType:"x mandatory"}}>
    {items.map((g,i)=>(
      <a key={i} href={g.page || g.src} target="_blank" rel="noopener noreferrer"
         className="relative flex-none w-4/5 sm:w-3/5 md:w-1/2 h-44 md:h-52 rounded-xl overflow-hidden shadow block"
         style={{scrollSnapAlign:"start"}} title={g.cap + "（點擊查看圖片來源）"}>
        <div className="absolute inset-0 stone-texture"
             style={{background:"linear-gradient(135deg,var(--lavender) 0%,var(--lavender-soft) 40%,var(--ochre) 100%)"}}/>
        <img src={g.src} alt={g.cap} loading="lazy"
             className="absolute inset-0 w-full h-full object-cover"
             onError={(e)=>{e.currentTarget.style.display="none";}}/>
        <span className="absolute bottom-0 left-0 right-0 px-3 py-2 text-white text-xs font-bold tracking-wide"
             style={{background:"linear-gradient(180deg,rgba(45,42,51,0),rgba(45,42,51,.62))"}}>
          📍 {g.cap}
        </span>
      </a>
    ))}
    <div className="flex-none w-1" aria-hidden="true"></div>
  </div>
);

/* ---------------- Section 1：行前裝備（可勾選 + 記憶） ---------------- */
const PACKING = [
  {icon:<I.CreditCard size={22}/>, tint:"var(--ochre-deep)", bg:"var(--ochre-mist)", title:"必備證件與財物",
   body:<>護照、個人藥品、信用卡。每人請務必自備至少<b>現金 300 歐元</b>用於支付包車車資，並多抓 10–20 歐元預備住宿稅、公車與市集消費。</>},
  {icon:<I.Sun size={22}/>, tint:"var(--ochre-deep)", bg:"var(--ochre-mist)", title:"盛夏防曬與防中暑",
   body:<>7 月南法高溫達 <b>32°C～35°C</b>，日照長達 14 小時，紫外線極強。請備妥高係數防曬乳、抗 UV 太陽眼鏡、寬邊遮陽帽及保溫水瓶（路邊有 “Eau potable” 可飲用泉水）。</>},
  {icon:<I.Footprints size={22}/>, tint:"var(--lavender-deep)", bg:"var(--lavender-mist)", title:"安全第一鞋履",
   body:<>亞爾等古城皆為中世紀鵝卵石路或陡峭石階。更重要的是，薰衣草田（7/15、7/17）蜜蜂極多，<b>嚴禁穿拖鞋或涼鞋</b>，請務必穿著「包頭運動鞋或布鞋」以防 🐝 螫傷。</>},
  {icon:<I.ShieldAlert size={22}/>, tint:"var(--danger)", bg:"var(--danger-bg)", title:"最高治安警戒",
   body:<>馬賽與亞維儂藝術節期間人潮極多。<b>防盜包一律往前背，手機絕不放桌上</b>，拒絕任何街頭強塞幸運繩、假簽名連署。包車時貴重物品切勿放在車窗看得到的地方，防範破窗。</>},
  {icon:<I.CheckSquare size={22}/>, tint:"var(--ocean-deep)", bg:"var(--ocean-mist)", title:"環保自備用品",
   body:<>亞爾 B&B 附吹風機與浴缸（想泡澡可自備用品）。法國響應環保，<b>不提供一次性牙刷、牙膏、刮鬍刀與室內拖鞋</b>，請務必自備。</>},
];

const PackingSection = () => {
  const KEY = "sf2026-packing";
  const [checked, setChecked] = useState(()=>{
    try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; }
  });
  const toggle = (i) => {
    const next = {...checked, [i]: !checked[i]};
    setChecked(next);
    try { localStorage.setItem(KEY, JSON.stringify(next)); } catch(e){}
  };
  const done = PACKING.filter((_,i)=>checked[i]).length;
  return (
    <section id="packing" className="section-anchor">
      <SectionTitle icon={<I.CheckSquare size={20}/>} eyebrow="SECTION 1 · ESSENTIALS"
        title="核心裝備與生活叮嚀" sub={`勾選檢查你的行前準備（${done}/${PACKING.length} 已完成，勾選狀態會自動記住）`}/>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {PACKING.map((p,i)=>(
          <label key={i} className={"card check-card p-5 flex flex-col gap-3 cursor-pointer " + (checked[i]?"done":"")}>
            <div className="flex items-start justify-between gap-3">
              <span className="w-11 h-11 rounded-xl flex items-center justify-center" style={{background:p.bg, color:p.tint}}>{p.icon}</span>
              <input type="checkbox" checked={!!checked[i]} onChange={()=>toggle(i)} aria-label={"完成：" + p.title}/>
            </div>
            <div>
              <div className="font-bold mb-1 font-serif-tc" style={{color:p.tint}}>{p.title}</div>
              <p className="text-sm leading-relaxed" style={{color:"var(--ink)"}}>{p.body}</p>
            </div>
          </label>
        ))}
      </div>
    </section>
  );
};

            <div className="font-serif-tc font-bold" style={{color:"var(--lavender-deep)"}}>{s.title}</div>
            <div className="flex flex-wrap gap-1">
              {s.tags.map(t=>(
                <span key={t} className="badge-tag" style={{background:"var(--lavender-mist)", color:"var(--lavender-deep)"}}>{t}</span>
              ))}
            </div>
            <p className="text-sm leading-relaxed" style={{color:"var(--ink)"}}>{s.body}</p>
          </div>
        </div>
      ))}
    </div>
  </section>
);

/* ---------------- 版面共用 ---------------- */
const SectionTitle = ({icon, eyebrow, title, sub}) => (
  <header className="mb-6">
    <div className="flex items-center gap-2 text-xs font-bold tracking-widest mb-1 font-display" style={{color:"var(--ochre-deep)"}}>
      {icon}<span>{eyebrow}</span>
    </div>
    <h2 className="font-serif-tc font-bold text-2xl md:text-3xl" style={{color:"var(--lavender-deep)"}}>{title}</h2>
    {sub && <p className="text-sm mt-1" style={{color:"var(--stone)"}}>{sub}</p>}
  </header>
);

const NAV = [
  {href:"#top", label:"首頁"},
  {href:"#packing", label:"行前裝備"},
  ...DAYS.map(d=>({href:"#"+d.id, label:d.date})),
  {href:"#souvenirs", label:"伴手禮"},
];

const Sidebar = () => (
  <aside className="hidden lg:flex flex-col fixed left-0 top-0 bottom-0 w-52 p-6 gap-1 overflow-y-auto scrollbar-none"
         style={{background:"linear-gradient(180deg,#FFFFFF, var(--lavender-mist))", borderRight:"1px solid rgba(94,78,150,.12)"}}>
    <a href="#top" className="font-display text-xl mb-1" style={{color:"var(--lavender-deep)"}}>PROVENCE</a>
    <div className="text-xs mb-4 font-bold tracking-widest" style={{color:"var(--ochre-deep)"}}>ÉTÉ 2026 · 7/11–7/19</div>
    {NAV.map(n=>(
      <a key={n.href} href={n.href} className="chip"
         style={{color:"var(--lavender-deep)"}}
         onMouseEnter={e=>{e.currentTarget.style.background="var(--lavender-mist)";}}
         onMouseLeave={e=>{e.currentTarget.style.background="transparent";}}>
        {n.label}

    <div className="mt-auto pt-4 text-xs" style={{color:"var(--stone)"}}>☀️ 陽光・薰衣草・地中海</div>
  </aside>
);

const MobileNav = () => (
  <nav className="lg:hidden sticky top-0 z-40 backdrop-filter" style={{background:"rgba(250,250,250,.92)", backdropFilter:"blur(8px)", borderBottom:"1px solid rgba(94,78,150,.12)"}}>
    <div className="flex gap-1 overflow-x-auto px-3 py-2 scrollbar-none">
      {NAV.map(n=>(
        <a key={n.href} href={n.href} className="chip flex-none"
           style={{background:"var(--lavender-mist)", color:"var(--lavender-deep)"}}>{n.label}</a>
      ))}
    </div>
  </nav>
);

const Hero = () => (
  <header id="top" className="section-anchor hero-sky stone-texture relative overflow-hidden text-white">
    <div className="max-w-4xl mx-auto px-5 pt-16 pb-14 md:pt-24 md:pb-20 relative" style={{zIndex:1}}>
      <div className="absolute right-6 top-8 opacity-80" style={{color:"#FFE3A8"}} aria-hidden="true"><I.Sun size={72}/></div>
      <div className="font-display tracking-widest text-sm mb-3" style={{color:"#FFE3A8"}}>PROVENCE · CÔTE D'AZUR · ÉTÉ 2026</div>
      <h1 className="font-serif-tc font-bold text-3xl md:text-5xl leading-tight mb-4" style={{textShadow:"0 2px 16px rgba(30,22,55,.75), 0 1px 3px rgba(30,22,55,.9)"}}>
        🏛️ 夢回羅馬小鎮<br/>
        <span className="text-2xl md:text-4xl">2026 南法盛夏之旅</span><br/>
        <span className="text-lg md:text-2xl font-normal">古羅馬、薰衣草與地中海風情全攻略</span>
      </h1>
      <p className="max-w-xl text-sm md:text-base leading-relaxed mb-6" style={{color:"#F3EEFB", textShadow:"0 1px 8px rgba(30,22,55,.7)"}}>
        7/11 – 7/19・里昂 → 亞爾 → 普羅旺斯山城花海 → 亞維儂 → 馬賽。八位旅伴、一路向南，追著陽光與薰衣草的方向。
      </p>
      <div className="flex items-center gap-3 flex-wrap">
        <div className="flex avatar-stack">{MEMBERS.map(n=><Avatar key={n} name={n}/>)}</div>
        <span className="badge-tag" style={{background:"rgba(255,255,255,.18)", color:"#fff"}}><I.Users size={13}/> 全團 8 人</span>
      </div>
    </div>
  </header>
);

const App = () => (
  <div>
    <Sidebar/>
    <div className="lg:ml-52">
      <MobileNav/>

      <main className="max-w-4xl mx-auto px-4 md:px-6 py-10 space-y-14">

          <SectionTitle icon={<I.Clock size={20}/>} eyebrow="SECTION 2 · ITINERARY"

            sub="點擊各卡片中的「歷史背景／核心景點／飯店資訊」可展開閱讀；卡片右上角為當日出席團員。"/>
          <div className="relative">
            <div className="timeline-line" aria-hidden="true"></div>
            {DAYS.map((d,i)=><DayCard key={d.id} d={d} idx={i}/>)}

        </section>
        <SouvenirSection/>
      </main>
      <footer className="text-center text-sm py-10" style={{color:"var(--stone)"}}>
        <div className="font-display tracking-widest mb-1" style={{color:"var(--lavender-deep)"}}>BON VOYAGE EN PROVENCE</div>
        2026 南法盛夏之旅・文安、思賢、皓哲、子豪、國廷、忻叡、韋菖、政倫
        <div className="text-xs mt-2 opacity-80">行程配圖來源：Wikimedia Commons（CC BY / CC BY-SA 等自由授權）・點擊各圖片可查看原始出處與作者</div>
      </footer>
    </div>
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
